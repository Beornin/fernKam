<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#1c1917"/>
  <!-- Camera body -->
  <rect x="4" y="11" width="24" height="16" rx="2.5" fill="#d97706"/>
  <!-- Viewfinder hump -->
  <path d="M12 11 L12 8 Q12 7 13 7 L19 7 Q20 7 20 8 L20 11 Z" fill="#d97706"/>
  <!-- Lens outer (dark ring) -->
  <circle cx="16" cy="19" r="5.5" fill="#78350f"/>
  <!-- Lens mid (amber) -->
  <circle cx="16" cy="19" r="4" fill="#fbbf24"/>
  <!-- Lens inner (dark pupil) -->
  <circle cx="16" cy="19" r="2.2" fill="#1c1917"/>
  <!-- Lens reflection -->
  <circle cx="14.8" cy="17.8" r="0.7" fill="#fde68a" opacity="0.8"/>
  <!-- Flash indicator -->
  <rect x="5.5" y="13" width="3" height="2" rx="1" fill="#78350f"/>
</svg>
